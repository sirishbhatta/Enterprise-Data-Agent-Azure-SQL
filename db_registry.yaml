databases:
  hr:
    name: HR Analytics
    type: postgresql
    host: localhost
    port: 5432
    database: hr_analytics
    username: postgres
    password_env: PG_PASSWORD
    domain: HR
    enabled: true
    description: Employee HR data — salaries, departments, hire dates
  claims:
    name: Healthcare Claims
    type: mssql
    host_env: SQL_SERVER_NAME
    database: HealthcareClaims
    username_env: SQL_USER
    password_env: SQL_PASSWORD
    domain: CLAIMS
    enabled: true
    description: Healthcare claims — billing, providers, approvals, denials
  oracle_erp:
    name: Oracle Sales CRM
    type: oracle
    host: localhost
    port: 1521
    service_name: XEPDB1
    username: BI_SALES
    password_env: ORACLE_PASSWORD
    domain: SALES
    enabled: true
    description: Sales CRM — customers, orders, products, reps, revenue, activities
  azure_sql:
    name: Azure SQL (Claims)
    type: mssql
    host: sirish-azure-sql-server.database.windows.net
    database: sirish_azure_sql_db
    username: sirishbhatta
    password_env: AZURE_SQL_PASSWORD
    domain: AZURE_CLAIMS
    enabled: true
    description: Azure SQL cloud database — Claims and ProviderClaimSummary tables
  mysql_app:
    name: MySQL Application DB
    type: mysql
    host: localhost
    port: 3306
    database: ''
    username: root
    password_env: MYSQL_PASSWORD
    domain: ''
    enabled: false
    description: MySQL transactional database
  snowflake_dw:
    name: Snowflake Data Warehouse
    type: snowflake
    account: ''
    warehouse: ''
    database: ''
    schema: PUBLIC
    username: ''
    password_env: SNOWFLAKE_PASSWORD
    domain: ''
    enabled: false
    description: Snowflake cloud data warehouse
  bigquery_analytics:
    name: Google BigQuery
    type: bigquery
    project: ''
    dataset: ''
    credentials_env: GOOGLE_APPLICATION_CREDENTIALS
    domain: ''
    enabled: false
    description: Google BigQuery analytics warehouse
  sqlite_local:
    name: SQLite (Local File)
    type: sqlite
    file_path: ''
    domain: ''
    enabled: false
    description: Lightweight local SQLite database
  duckdb_analytics:
    name: DuckDB Analytics
    type: duckdb
    file_path: ''
    domain: ''
    enabled: false
    description: DuckDB — fast in-process analytics engine (great for Parquet/CSV)
  databricks_lakehouse:
    name: Databricks Lakehouse
    type: databricks
    host: ''
    http_path: ''
    catalog: ''
    database: ''
    token_env: DATABRICKS_TOKEN
    domain: ''
    enabled: false
    description: Databricks SQL warehouse / Unity Catalog
  redshift_dw:
    name: Amazon Redshift
    type: redshift
    host: ''
    port: 5439
    database: ''
    username: ''
    password_env: REDSHIFT_PASSWORD
    domain: ''
    enabled: false
    description: Amazon Redshift cloud data warehouse
